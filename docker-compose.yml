services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SMALLERDOCS_TEMP_ROOT: /tmp/smallerdocs
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
